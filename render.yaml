      - key: EMBEDDING_PROVIDER
        value: huggingface
      - key: EMBEDDING_MODEL
        value: BAAI/bge-large-en-v1.5
      - key: HF_API_TOKEN
        sync: false
      - key: WORKER_CONCURRENCY
        value: "2"
      - key: AGENT_LLM_PROVIDER
        value: openrouter
      - key: AGENT_LLM_MODEL
        value: google/gemma-4-31b-it:free
