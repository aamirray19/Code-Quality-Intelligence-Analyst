        value: google/gemma-4-26b-a4b-it:free
      - key: OPENROUTER_API_KEY_SUPERVISOR
        sync: false
      - key: OPENROUTER_API_KEY_SECURITY
        sync: false
      - key: OPENROUTER_API_KEY_PERFORMANCE
        sync: false
      - key: OPENROUTER_API_KEY_COMPLEXITY
        sync: false
      - key: OPENROUTER_API_KEY_DUPLICATION
        sync: false
      - key: OPENROUTER_API_KEY_RELIABILITY
        sync: false
      - key: OPENROUTER_API_KEY_SECURITY_FALLBACK
        sync: false
      - key: OPENROUTER_API_KEY_PERFORMANCE_FALLBACK
        sync: false
      - key: OPENROUTER_API_KEY_COMPLEXITY_FALLBACK
        sync: false
      - key: OPENROUTER_API_KEY_DUPLICATION_FALLBACK
        sync: false
      - key: OPENROUTER_API_KEY_RELIABILITY_FALLBACK
        sync: false
      - key: AGENT_MAX_RETRIES
        value: "2"
      - key: AGENT_TIMEOUT_SECONDS
        value: "120"
      - key: LANGGRAPH_RECURSION_LIMIT
        value: "50"
      - key: MAX_AGENT_CONTEXT_CHUNKS
        value: "12"
      - key: MAX_FINDINGS_PER_AGENT
        value: "20"
      - key: OPENROUTER_API_KEY_CHATBOT
